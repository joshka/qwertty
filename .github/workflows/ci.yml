name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Format
        run: cargo +nightly fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace --all-features

      - name: Test examples
        run: cargo test --examples --workspace --all-features

      - name: Database validate
        run: cargo run -p qdb -- validate

      - name: Database caniuse matrix up to date
        run: cargo run -p qdb -- generate --check matrix

      - name: Loom models
        run: cargo test --lib loom_
        env:
          RUSTFLAGS: --cfg loom

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install --global markdownlint-cli2

      - name: Markdown
        run: markdownlint-cli2 "**/*.md"

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      # Each syntax-layer invariant gets a short run per push; deep runs stay local or scheduled.
      - name: Fuzz reconstruction
        run: cargo +nightly fuzz run syntax_reconstruction -- -max_total_time=30 -rss_limit_mb=1024

      - name: Fuzz split-equivalence
        run: cargo +nightly fuzz run syntax_split_equivalence -- -max_total_time=30 -rss_limit_mb=1024

      - name: Fuzz no-panic bounded
        run: cargo +nightly fuzz run syntax_no_panic_bounded -- -max_total_time=30 -rss_limit_mb=1024

      - name: Fuzz correlator properties
        run: cargo +nightly fuzz run correlator_properties -- -max_total_time=30 -rss_limit_mb=1024

  required:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - fmt
      - test
      - clippy
      - doc
      - markdown
      - fuzz
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_FAILED_JOB: >-
            ${{
              contains(needs.*.result, 'failure')
              || contains(needs.*.result, 'cancelled')
              || contains(needs.*.result, 'skipped')
            }}
        run: |
          echo "$NEEDS_JSON"
          test "$HAS_FAILED_JOB" = "false"
