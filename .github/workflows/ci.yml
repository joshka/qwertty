name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Ensure the workflow only runs once per ref; new pushes to a PR cancel the in-flight run.
# See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# Set the token permissions to the minimum and grant per-job what is needed.
# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions
permissions: {}

jobs:
  # Fast lint jobs run first so simple failures (formatting, typos, clippy, dependency policy)
  # surface before the heavier test/cross matrix.

  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps

  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  typos:
    name: Typos
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install typos
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: typos-cli
      - name: Check spelling
        run: typos

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Clippy (workspace, all features)
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      # Default-feature clippy. The all-targets, all-features pass above compiles the library with
      # Tokio and with test cfg, hiding dead code that only a default-feature, non-test build would
      # surface. This lints the library exactly as a default-feature dependency sees it.
      - name: Clippy (default features)
        run: cargo clippy -p qwertty -- -D warnings

  doc:
    name: Docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Docs (workspace, all features)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps
      # Default-feature docs. The all-features run above hides default-feature doc breakage (for
      # example an intra-doc link that only resolves under `tokio`). This enforces that `cargo doc`
      # is clean for a default-feature consumer of the crate.
      - name: Docs (default features)
        run: RUSTDOCFLAGS="-D warnings" cargo doc -p qwertty --no-deps

  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install markdownlint
        run: npm install --global markdownlint-cli2
      - name: Lint Markdown
        run: markdownlint-cli2 "**/*.md"

  # Check for disallowed dependencies due to license / security issues.
  # See <https://github.com/EmbarkStudios/cargo-deny>
  cargo-deny:
    name: Dependency check (${{ matrix.checks }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans licenses sources
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-deny
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny
      - name: Run cargo-deny
        run: cargo deny check ${{ matrix.checks }}

  # Check for unused dependencies. See <https://github.com/bnjbvr/cargo-machete>
  cargo-machete:
    name: Unused dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run cargo-machete
        uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2

  # Check that dependency lower bounds are accurate.
  minimal-versions:
    name: Minimal versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Install cargo-minimal-versions
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-minimal-versions,cargo-hack
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check minimal versions
        run: cargo minimal-versions check --direct --workspace --all-features

  # Gate PRs against unintended breaking changes in the public API. qwertty is at 0.1.0; once the
  # first version is published, cargo-semver-checks compares the PR against that crates.io baseline.
  # Until then it is a no-op with no baseline, so it never blocks the pre-publish period.
  semver-checks:
    name: Semver checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-semver-checks
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # Pre-publish tolerance: with no crates.io baseline yet, cargo-semver-checks errors with
      # "not found in registry". Treat that one case as a skip so the gate is green until the first
      # publish, after which the real baseline comparison kicks in automatically. All other
      # failures (an actual breaking change once a baseline exists) still fail the job.
      - name: Check semver
        run: |
          output=$(cargo semver-checks check-release -p qwertty 2>&1) && status=0 || status=$?
          echo "$output"
          if [ "$status" -ne 0 ] && echo "$output" | grep -q "not found in registry"; then
            echo "::notice::qwertty is not yet published; no semver baseline. Skipping."
            exit 0
          fi
          exit "$status"

  # Build and test on the minimum supported Rust version. Policy is stable N-1 (one release behind
  # current stable); that toolchain is pinned in Cargo.toml's `rust-version` and duplicated here.
  # Bump both together when the stable-N-1 target advances.
  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.85"
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build on MSRV
        run: cargo build --workspace --all-features
      - name: Test on MSRV
        run: cargo test --workspace --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test
        run: cargo test --workspace --all-features
      - name: Test examples
        run: cargo test --examples --workspace --all-features
      # Default-feature doctests. The all-features run hides reference `rust` fences that only
      # compile without the Tokio session, so a Tokio-only API in a default-feature doctest would
      # break a real `cargo test -p qwertty` while passing above. This step enforces they pass.
      - name: Doctests (default features)
        run: cargo test -p qwertty --doc
      - name: Database validate
        run: cargo run -p qdb -- validate
      - name: Generated conformance reference up to date
        run: cargo run -p qdb -- generate --check reference
      - name: Loom models
        run: cargo test --lib loom_
        env:
          RUSTFLAGS: --cfg loom

  # Runs the two Linux-only conformance targets (foot under a self-managed headless Wayland
  # compositor, xterm under a self-managed headless Xvfb) that cannot run on the macOS/Windows
  # machines the other targets were captured from. Unlike those targets — captured once locally
  # and committed — this job's capture step runs fresh on every push, so it is deliberately NOT
  # in `required`'s needs list: a transient runner/package hiccup on a target no session can
  # reproduce locally should not block unrelated PRs. It still fails loudly on drift between a
  # fresh capture and the committed `db/results/{foot,xterm}.toml` (same freshness philosophy as
  # A3's `generate --check reference`) and uploads the fresh capture as a build artifact so a
  # human can inspect and commit it — never auto-committed. Promote to `required` once proven
  # stable over a few runs (maintainer's call).
  linux-targets:
    name: Linux conformance targets (foot, xterm)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install foot, xterm, sway, Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y foot xterm sway xvfb
      # The foot adapter creates its own private XDG_RUNTIME_DIR per session (a fresh directory
      # makes sway's `wayland-1` socket name predictable and collision-free — sway does not honor
      # a caller-chosen WAYLAND_DISPLAY when picking its own socket name), so no runner-side
      # runtime-dir setup is needed here.
      - name: Capture foot
        run: cargo run -p qdb -- capture --target foot
      - name: Capture xterm
        run: cargo run -p qdb -- capture --target xterm
      - name: Regenerate conformance reference
        run: cargo run -p qdb -- generate reference
      - name: Upload fresh capture
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-targets-capture
          path: |
            db
            fixtures
            docs/reference/generated
          if-no-files-found: error
      # A fresh capture that differs from the committed tree means either the baseline has never
      # been committed yet, or foot/xterm's behavior (or this job's own package versions) drifted
      # since the last capture. Both cases need a human to look at the uploaded artifact above and
      # commit it — never silently auto-committed.
      #
      # Volatile-by-construction lines are ignored, or every re-run would drift: the results
      # `captured =` date, sidecar `"timestamp":` fields, and fixture `#!` headers (which embed
      # capture date + version) are stamped fresh on each run. Anything semantic — verdicts,
      # reply bytes, tool versions in results — still drifts loudly. The regenerated reference is
      # NOT drift-checked here (its pages embed the fresh run dates); committed-reference ⇄
      # committed-results coherence is already gated by `generate --check reference` in the test
      # job, so this job only needs to prove live behavior ⇄ committed results. `git add -N`
      # makes brand-new (untracked) capture artifacts visible to the diff — without it a missing
      # baseline would pass silently.
      - name: Check for drift against committed results
        run: |
          git add --intent-to-add db fixtures
          drift=$(git diff -I'^captured = ' -I'"timestamp": ' -I'^#! ' -- db fixtures)
          if [ -n "$drift" ]; then
            echo "$drift"
            echo "::error::foot/xterm capture drifted from the committed db/ and fixtures/ \
          (new or changed results, sidecars, or fixtures). Download the linux-targets-capture \
          artifact from this run, review it, and commit it."
            exit 1
          fi

  # Each syntax-layer invariant gets a short nightly cargo-fuzz smoke run per push; deep runs stay
  # local or scheduled.
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-fuzz
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Fuzz reconstruction
        run: cargo +nightly fuzz run syntax_reconstruction --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=1024
      - name: Fuzz split-equivalence
        run: cargo +nightly fuzz run syntax_split_equivalence --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=1024
      - name: Fuzz no-panic bounded
        run: cargo +nightly fuzz run syntax_no_panic_bounded --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=1024
      - name: Fuzz correlator properties
        run: cargo +nightly fuzz run correlator_properties --target x86_64-unknown-linux-gnu -- -max_total_time=30 -rss_limit_mb=1024

  # Runs the platform-neutral test suite (encode, decode, syntax, events, reports, database
  # consumers) on real Windows. The live-terminal session is Unix-only, so its tests are
  # cfg-gated out here; what remains is the whole cross-platform core, executed — not just
  # cross-compiled — so decode/vocabulary logic is proven on Windows on every push.
  windows:
    name: Windows
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Test (platform-neutral core)
        # Unit and integration tests only, not doctests: the reference-doc examples exercise the
        # Unix-only session API (`TerminalSession::open`, `restore_handle`, …), which does not exist
        # on Windows, so they cannot compile here. The platform-neutral core they document is still
        # fully exercised by the lib and integration tests, and the doctests run on the Unix jobs.
        run: cargo test -p qwertty --tests
      - name: Test (all features)
        # Runs the tokio-gated Windows async session tests (the console worker construction and
        # teardown live suite) on a real console. Kept separate from the default-feature run above
        # so a feature-gating hole in either build is still caught. `--tests` excludes doctests for
        # the same reason as the default-feature step.
        run: cargo test -p qwertty --tests --all-features
      - name: Clippy
        run: cargo clippy -p qwertty --all-targets -- -D warnings

  # Cross-compiles the library to Windows and wasm from Linux with warnings denied. Fast, and
  # catches any Unix type leaking into the platform-neutral surface before it reaches a real
  # Windows build (design 07: the encode/decode/database-consuming layers build everywhere).
  cross:
    name: Cross
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc, wasm32-unknown-unknown
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check Windows target
        run: cargo clippy -p qwertty --target x86_64-pc-windows-msvc -- -D warnings
      # The default-feature clippy above does not compile the Windows async session driver, which
      # lives behind the `tokio` feature (the console worker + readiness transport). The
      # `--all-features` pass is the only place that Windows FFI is compiled off a real Windows
      # host, so without it the async driver would bitrot uncaught between windows-latest runs.
      - name: Check Windows target (all features)
        run: cargo clippy -p qwertty --all-features --all-targets --target x86_64-pc-windows-msvc -- -D warnings
      # Mirrors `just check-cross`: the clippy library pass alone lets a Unix-only API call in
      # test code slip through to the windows-latest job; compiling the tests here catches it in
      # the same fast Linux job. No wasm equivalent — the `generator` crate (via the loom
      # dev-dependency) has no wasm backend, so tests cannot compile for wasm32-unknown-unknown.
      - name: Check Windows target (tests)
        run: cargo check -p qwertty --tests --target x86_64-pc-windows-msvc
      - name: Check Windows target (tests, all features)
        run: cargo check -p qwertty --all-features --tests --target x86_64-pc-windows-msvc
      - name: Check wasm target
        run: cargo clippy -p qwertty --target wasm32-unknown-unknown -- -D warnings

  required:
    name: Required
    runs-on: ubuntu-latest
    needs:
      - metadata
      - fmt
      - typos
      - clippy
      - doc
      - markdown
      - cargo-deny
      - cargo-machete
      - minimal-versions
      - semver-checks
      - msrv
      - test
      - fuzz
      - windows
      - cross
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_FAILED_JOB: >-
            ${{
              contains(needs.*.result, 'failure')
              || contains(needs.*.result, 'cancelled')
              || contains(needs.*.result, 'skipped')
            }}
        run: |
          echo "$NEEDS_JSON"
          test "$HAS_FAILED_JOB" = "false"
