name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly rustfmt
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Format
        run: cargo +nightly fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test --workspace --all-features

      - name: Test examples
        run: cargo test --examples --workspace --all-features

      # Default-feature doctests. The all-features run hides reference `rust` fences that only
      # compile without the Tokio session, so a Tokio-only API in a default-feature doctest would
      # break a real `cargo test -p qwertty` while passing above. This step enforces that they pass.
      - name: Doctests (default features)
        run: cargo test -p qwertty --doc

      - name: Database validate
        run: cargo run -p qdb -- validate

      - name: Database caniuse matrix up to date
        run: cargo run -p qdb -- generate --check matrix

      - name: Loom models
        run: cargo test --lib loom_
        env:
          RUSTFLAGS: --cfg loom

  clippy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps

  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install markdownlint
        run: npm install --global markdownlint-cli2

      - name: Markdown
        run: markdownlint-cli2 "**/*.md"

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      # Each syntax-layer invariant gets a short run per push; deep runs stay local or scheduled.
      - name: Fuzz reconstruction
        run: cargo +nightly fuzz run syntax_reconstruction -- -max_total_time=30 -rss_limit_mb=1024

      - name: Fuzz split-equivalence
        run: cargo +nightly fuzz run syntax_split_equivalence -- -max_total_time=30 -rss_limit_mb=1024

      - name: Fuzz no-panic bounded
        run: cargo +nightly fuzz run syntax_no_panic_bounded -- -max_total_time=30 -rss_limit_mb=1024

      - name: Fuzz correlator properties
        run: cargo +nightly fuzz run correlator_properties -- -max_total_time=30 -rss_limit_mb=1024

  # Runs the platform-neutral test suite (encode, decode, syntax, events, reports, database
  # consumers) on real Windows. The live-terminal session is Unix-only, so its tests are
  # cfg-gated out here; what remains is the whole cross-platform core, executed — not just
  # cross-compiled — so decode/vocabulary logic is proven on Windows on every push.
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Test (platform-neutral core)
        run: cargo test -p qwertty

      - name: Clippy
        run: cargo clippy -p qwertty --all-targets -- -D warnings

  # Cross-compiles the library to Windows and wasm from Linux with warnings denied. Fast, and
  # catches any Unix type leaking into the platform-neutral surface before it reaches a real
  # Windows build (design 07: the encode/decode/database-consuming layers build everywhere).
  cross:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, wasm32-unknown-unknown

      - name: Check Windows target
        run: cargo clippy -p qwertty --target x86_64-pc-windows-msvc -- -D warnings

      - name: Check wasm target
        run: cargo clippy -p qwertty --target wasm32-unknown-unknown -- -D warnings

  required:
    runs-on: ubuntu-latest
    needs:
      - metadata
      - fmt
      - test
      - clippy
      - doc
      - markdown
      - fuzz
      - windows
      - cross
    if: ${{ always() }}
    steps:
      - name: Check required jobs
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          HAS_FAILED_JOB: >-
            ${{
              contains(needs.*.result, 'failure')
              || contains(needs.*.result, 'cancelled')
              || contains(needs.*.result, 'skipped')
            }}
        run: |
          echo "$NEEDS_JSON"
          test "$HAS_FAILED_JOB" = "false"
