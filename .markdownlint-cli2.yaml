config:
  line-length:
    line_length: 100
    code_blocks: false
    tables: false
  table-pipe-style:
    style: leading_and_trailing
  table-column-style:
    style: aligned
    aligned_delimiter: true
globs:
  - "**/*.md"
ignores:
  - "target"
  - "spikes"
  - "work"
  # Generated qdb reference pages (long citation URLs); their shape is pinned by a golden test.
  - "tools/qdb/tests/golden"
  # Generated caniuse support matrix (db/caniuse.md): a wide data table (per-target status cells)
  # that cannot satisfy aligned table-column-style without fragile hand-rolled padding logic; its
  # shape is pinned by a golden test and `qdb generate --check` catches drift instead.
  - "db/caniuse.md"
