config:
  line-length:
    line_length: 100
    code_blocks: false
    tables: false
  # Keep-a-changelog repeats section headings (Added/Changed/Fixed) once per release, so duplicate
  # headings are only a problem when they share a parent. Scope the check to siblings.
  no-duplicate-heading:
    siblings_only: true
  table-pipe-style:
    style: leading_and_trailing
  table-column-style:
    style: aligned
    aligned_delimiter: true
globs:
  - "**/*.md"
ignores:
  - "target"
  - "spikes"
  - "work"
  # The generated qdb conformance reference (`qdb generate reference`): the per-family pages carry
  # unbreakable long citation URLs and per-target conformance lines, and the matrix/summary are
  # wide data tables (per-target cells) that cannot satisfy aligned table-column-style without
  # fragile hand-rolled padding. This is machine-emitted, not hand-authored, so it is exempt from
  # the hand-authoring style rules; its exact shape is instead pinned by the golden test and
  # `qdb generate --check reference` (run in `just check` and CI), which catch any drift.
  - "docs/reference/generated"
