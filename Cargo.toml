[package]
name = "qwertty"
version = "0.0.0"
edition = "2024"
rust-version = "1.85"
description = "Terminal application building blocks for explicit ownership, ordered output, and policy-aware features."
license = "MIT OR Apache-2.0"
repository = "https://github.com/joshka/qwertty"
readme = "README.md"
keywords = ["terminal", "tui", "ansi", "tty"]
categories = ["command-line-interface"]
publish = false

[lib]
path = "src/lib.rs"

[lints.rust]
missing_docs = "warn"
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"
