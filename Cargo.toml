[package]
name = "qwertty"
version = "0.0.0"
edition = "2024"
rust-version = "1.85"
description = "Terminal application building blocks for explicit ownership, ordered output, and policy-aware features."
license = "MIT OR Apache-2.0"
repository = "https://github.com/joshka/qwertty"
readme = "README.md"
keywords = ["terminal", "tui", "ansi", "tty"]
categories = ["command-line-interface"]
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []
tokio = ["dep:tokio"]

[lints.rust]
missing_docs = "warn"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(loom)"] }
unsafe_code = "forbid"

[lints.clippy]
all = "warn"
pedantic = "warn"

[dev-dependencies]
loom = "0.7"

[target.'cfg(unix)'.dependencies]
rustix = { version = "1", features = ["fs", "pty", "stdio", "termios"] }
tokio = { version = "1", optional = true, default-features = false, features = [
    "macros",
    "net",
    "rt",
    "time",
] }
