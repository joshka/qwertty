syntax      = "ESC ( B"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/ecma48/esc_charset_g0_us_ascii.seq"]
replay      = "modal"

[[sequence]]
id          = "ecma48.dcs.decrqss"
