# ecma48-syntax sequence family. Harvested from the audited reference prototype
# (joshka/qwertty-reference-prototype) per work/phase3/salvage.md Part 2.

[[sequence]]
id          = "ecma48.c0.bel"
name        = "C0 BEL"
description = "Preserved as a control token; semantic handling is application-specific."
direction   = "bidirectional"
syntax      = "BEL"
refs        = [{ doc = "ecma48" }]
fixtures    = ["fixtures/ecma48/c0_bel.seq"]
replay      = "safe"

[[sequence]]
id          = "ecma48.c0.lf"
name        = "C0 LF"
description = "The event decoder maps LF/CR to an Enter key for application input."
direction   = "bidirectional"
syntax      = "LF"
refs        = [{ doc = "ecma48" }]
fixtures    = ["fixtures/ecma48/c0_lf.seq"]
replay      = "safe"

[[sequence]]
id          = "ecma48.c1.csi_8bit"
name        = "C1 CSI"
description = "8-bit CSI is parsed into the same syntax token as ESC [ CSI."
direction   = "bidirectional"
syntax      = "0x9B params final"
refs        = [{ doc = "ecma48" }]
fixtures    = ["fixtures/ecma48/c1_csi.seq"]
replay      = "safe"

[[sequence]]
id          = "ecma48.esc.dec_save_cursor"
name        = "DEC Save Cursor"
description = "Legacy DEC save-cursor command; SCOSC may be preferable in some terminals."
direction   = "host-to-terminal"
syntax      = "ESC 7"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/ecma48/esc_dec_save_cursor.seq"]
replay      = "modal"

[[sequence]]
id          = "ecma48.esc.dec_restore_cursor"
name        = "DEC Restore Cursor"
description = "Legacy DEC restore-cursor command; SCORC may be preferable in some terminals."
direction   = "host-to-terminal"
syntax      = "ESC 8"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/ecma48/esc_dec_restore_cursor.seq"]
replay      = "modal"

[[sequence]]
id          = "ecma48.esc.charset_g0_us_ascii"
name        = "Select G0 US ASCII"
description = "Charset selection is syntax-preserved but not modeled semantically."
