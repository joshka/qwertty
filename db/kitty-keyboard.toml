# kitty-keyboard sequence family. Harvested from the audited reference prototype
# (joshka/qwertty-reference-prototype) per work/phase3/salvage.md Part 2.

[[sequence]]
id          = "kitty.keyboard.enable"
name        = "Enable Kitty Keyboard Protocol"
description = "Progressive enhancement flags are negotiated per session."
direction   = "host-to-terminal"
syntax      = "CSI > flags u"
refs        = [{ doc = "kitty-keyboard" }]
fixtures    = ["fixtures/kitty/keyboard_enable.seq"]
replay      = "modal"

[[sequence]]
id          = "kitty.keyboard.disable"
name        = "Disable Kitty Keyboard Protocol"
description = "Cleanup pair for Kitty keyboard protocol."
direction   = "host-to-terminal"
syntax      = "CSI < u"
refs        = [{ doc = "kitty-keyboard" }]
fixtures    = ["fixtures/kitty/keyboard_disable.seq"]
replay      = "modal"

[[sequence]]
id          = "kitty.keyboard.pop"
name        = "Pop Kitty Keyboard Protocol Flags"
description = "Restores a previous keyboard protocol stack entry."
direction   = "host-to-terminal"
syntax      = "CSI < count u"
refs        = [{ doc = "kitty-keyboard" }]
fixtures    = ["fixtures/kitty/keyboard_pop.seq"]
replay      = "modal"

