[[sequence]]
id          = "kitty.misc.unscroll"
name        = "Move Screen Contents To Scrollback"
description = "Kitty documents this as an extension for moving screen contents into scrollback."
direction   = "host-to-terminal"
syntax      = "CSI 3 ; 1 J"
refs        = [{ doc = "kitty-protocol-extensions" }]
