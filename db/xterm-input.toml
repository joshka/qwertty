# xterm-input sequence family. Harvested from the audited reference prototype
# (joshka/qwertty-reference-prototype) per work/phase3/salvage.md Part 2.

[[sequence]]
id          = "xterm.bracketed_paste.enable"
name        = "Enable Bracketed Paste"
description = "Paste payload is aggregated between start and end markers."
direction   = "host-to-terminal"
syntax      = "CSI ? 2004 h"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/bracketed_paste_enable.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.bracketed_paste.disable"
name        = "Disable Bracketed Paste"
description = "Turns off bracketed paste so pasted text is no longer wrapped in markers."
direction   = "host-to-terminal"
syntax      = "CSI ? 2004 l"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/bracketed_paste_disable.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.bracketed_paste.start"
name        = "Bracketed Paste Start"
description = "Internal delimiter; public event is the aggregated paste payload."
direction   = "terminal-to-host"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = []
replay      = "safe"
notes       = "reply syntax pending live capture"

[[sequence]]
id          = "xterm.bracketed_paste.end"
name        = "Bracketed Paste End"
description = "Internal delimiter; public event is the aggregated paste payload."
direction   = "terminal-to-host"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = []
replay      = "safe"
notes       = "reply syntax pending live capture"

