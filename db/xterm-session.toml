# xterm-session sequence family. Harvested from the audited reference prototype
# (joshka/qwertty-reference-prototype) per work/phase3/salvage.md Part 2.

[[sequence]]
id          = "xterm.alternate_screen.enter_47"
name        = "Enter Legacy Alternate Screen"
description = "Legacy xterm alternate-screen form; does not save cursor like 1049."
direction   = "host-to-terminal"
syntax      = "CSI ? 47 h"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/enter_alternate_screen_47.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.alternate_screen.leave_47"
name        = "Leave Legacy Alternate Screen"
description = "Cleanup pair for the legacy mode 47 alternate screen."
direction   = "host-to-terminal"
syntax      = "CSI ? 47 l"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/leave_alternate_screen_47.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.alternate_screen.enter_1047"
name        = "Enter Alternate Screen Buffer"
description = "Compatibility alternate-screen buffer switch without cursor save/restore."
direction   = "host-to-terminal"
syntax      = "CSI ? 1047 h"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/enter_alternate_screen_1047.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.alternate_screen.leave_1047"
name        = "Leave Alternate Screen Buffer"
description = "Cleanup pair for mode 1047 alternate-screen buffer."
direction   = "host-to-terminal"
syntax      = "CSI ? 1047 l"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/leave_alternate_screen_1047.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.alternate_screen.enter_1049"
name        = "Enter Alternate Screen"
description = "Common full-screen TUI lifecycle command."
direction   = "host-to-terminal"
syntax      = "CSI ? 1049 h"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/enter_alternate_screen_1049.seq"]
replay      = "modal"
notes       = "Session lifecycle code pairs this with an explicit csi.ed.clear_screen (CSI 2 J) immediately after entry: some hosts (mosh) do not clear the alternate buffer on 1049, and helix emits its own clear for exactly this reason (R-OUT-3)."

[[sequence]]
id          = "xterm.alternate_screen.leave_1049"
name        = "Leave Alternate Screen"
description = "Cleanup pair for entering the alternate screen."
direction   = "host-to-terminal"
syntax      = "CSI ? 1049 l"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/leave_alternate_screen_1049.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.cursor.style.default"
name        = "DECSCUSR Default Cursor Style"
description = "Resets the cursor style to the terminal profile default."
direction   = "host-to-terminal"
syntax      = "CSI 0 SP q"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/cursor_style_default.seq"]
replay      = "modal"
notes       = "No single Ps value is a universal restore-to-prior-shape (FM-L3): this asks for the terminal profile's own default, not necessarily whatever shape was active before."

