# xterm-session sequence family. Harvested from the audited reference prototype
# (joshka/qwertty-reference-prototype) per work/phase3/salvage.md Part 2.

[[sequence]]
id          = "xterm.alternate_screen.enter_47"
name        = "Enter Legacy Alternate Screen"
description = "Legacy xterm alternate-screen form; does not save cursor like 1049."
direction   = "host-to-terminal"
syntax      = "CSI ? 47 h"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/enter_alternate_screen_47.seq"]
replay      = "modal"

[[sequence]]
id          = "xterm.alternate_screen.leave_47"
name        = "Leave Legacy Alternate Screen"
description = "Cleanup pair for the legacy mode 47 alternate screen."
direction   = "host-to-terminal"
syntax      = "CSI ? 47 l"
refs        = [{ doc = "xterm-ctlseqs" }]
fixtures    = ["fixtures/xterm/leave_alternate_screen_47.seq"]
replay      = "modal"

